# Netlify configuration — Veridian Group Limited
# Static site, no build step required.

[build]
  # The site is pre-built HTML/CSS/JS — Netlify just serves the root directory.
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true   # /about instead of /about.html in the URL bar

[build.processing.css]
  bundle  = true
  minify  = true

[build.processing.js]
  bundle  = true
  minify  = true

[build.processing.images]
  compress = true

# Sensible headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

# Long-cache static assets (logos, fonts, images)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
