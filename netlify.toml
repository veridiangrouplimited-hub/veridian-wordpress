# Netlify configuration — Veridian Limited
# Static site, no build step required.

[build]
  # The site is pre-built HTML/CSS/JS — Netlify just serves the root directory.
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true   # /about instead of /about.html in the URL bar

[build.processing.css]
  bundle  = true
  minify  = true

[build.processing.js]
  bundle  = true
  minify  = true

[build.processing.images]
  compress = true

# First-party proxy for Umami analytics.
# Blocklists (EasyPrivacy, Opera's built-in blocker) match the
# cloud.umami.is hostname; serving the script and beacon endpoint from
# our own domain means those rules never fire. Cookieless, no personal
# data — disclosed in the privacy policy.
[[redirects]]
  from = "/veridian-edge.js"
  to = "https://cloud.umami.is/script.js"
  status = 200

[[redirects]]
  from = "/va/api/send"
  to = "https://cloud.umami.is/api/send"
  status = 200

# Sensible headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

# Long-cache static assets (logos, fonts, images)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
